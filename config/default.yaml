# GoldTrader Pro — Configuração Padrão

app:
  name: "GoldTrader Pro"
  version: "0.1.0"
  mode: "paper"  # paper | live | backtest | signal_only
  log_level: "INFO"

data_feed:
  default_provider: "csv"  # csv | ccxt | mt5
  symbol: "XAU/USD"
  timeframes:
    operational: "M15"
    primary: "D1"
    macro: "W1"
  candle_buffer_size: 500

database:
  host: "localhost"
  port: 5432
  name: "goldtrader"
  user: "goldtrader"
  password: "goldtrader_dev"

redis:
  host: "localhost"
  port: 6379
  db: 0

indicators:
  moving_averages:
    mma_periods: [20, 50, 100, 200]
    mme_periods: [9, 21, 50]
  adx:
    period: 14
    trend_threshold: 32  # ADX > 32 = tendência válida
  rsi:
    period: 14
    overbought: 70
    oversold: 30
  didi:
    short_period: 3
    mid_period: 8
    long_period: 20

patterns:
  body_max_ratio: 0.30       # corpo <= 30% da amplitude
  wick_min_ratio: 2.0        # pavio >= 2x corpo
  wick_max_opposite: 0.10    # pavio oposto <= 10% amplitude
  doji_threshold: 0.05       # corpo <= 5% amplitude
  engulfing_min_ratio: 1.0   # corpo engolfo > corpo anterior

volume:
  confirmation_ratio: 1.5    # volume >= 1.5x média
  climactic_ratio: 3.0       # volume >= 3.0x média
  lookback_period: 20

confluence:
  min_score: 0.65
  weights:
    pattern: 0.30
    volume: 0.20
    adx: 0.15
    ma_alignment: 0.15
    rsi: 0.10
    didi: 0.10

risk:
  risk_per_trade: 0.01       # 1% do capital
  min_risk_reward: 1.5       # mínimo 1:1.5
  max_concurrent_trades: 3
  max_daily_drawdown: 0.03   # 3%
  trailing_stop: false
  trailing_activation: 1.0   # ativa em 1:1

execution:
  anti_repainting: true      # executa somente em candle fechado
  slippage_simulation: 0.5   # pips de slippage simulado
  spread_simulation: 2.0     # pips de spread simulado
